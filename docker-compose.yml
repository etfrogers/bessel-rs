services:
  gemini:
    #    image: google/gemini-cli:latest
    build: .
    # image: us-docker.pkg.dev/gemini-code-dev/gemini-cli/sandbox:0.1.1
    # user: "${UID}:${GID}" # Matches the container user to YOU
    user: "node" # Use the 'node' user provided in the image
    stdin_open: true # Allows interactive input
    tty: true # Allows terminal formatting
    # This forces Docker to use the global binary regardless of your WORKDIR
    # entrypoint: [ "gemini" ]
    volumes:
      # This maps your local code to the container
      - .:/workspace
      # This "remembers" your login credentials
      # - ~/.gemini:/root/.gemini
      # This shares your Google Cloud auth if needed
      # - ~/.config/gcloud:/root/.config/gcloud
      # Mount to a non-root directory
      - ~/.gemini:/home/node/.gemini
      - ~/.config/gcloud:/home/node/.config/gcloud
      # Persistent cache for crates and tools
      - cargo-cache:/home/node/.cargo/registry
      - cargo-git-cache:/home/node/.cargo/git
    working_dir: /workspace
    environment:
      # THIS IS THE KEY: Tell the CLI where to look for config
      - HOME=/home/node
      - GOOGLE_CONFIG_DIR=/home/node/.config/gcloud
      # - PATH=/home/node/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      # Optional: If you prefer an API key over OAuth
      # - GEMINI_API_KEY=${GEMINI_API_KEY}

volumes:
  cargo-cache:
  cargo-git-cache:
